<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Support Agents interview</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f4f7f6; display: flex; justify-content: center; padding: 20px; }
        .container { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 650px; }
        h2 { color: #2c3e50; border-bottom: 2px solid #3498db; padding-bottom: 10px; text-align: center; }
        .setup-section, .quiz-section, .result-section { display: none; }
        .active { display: block; }
        input[type="text"] { width: 100%; padding: 12px; margin: 15px 0; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box; font-size: 16px; }
        button { color: white; border: none; padding: 12px 20px; border-radius: 5px; cursor: pointer; width: 100%; font-size: 16px; margin-top: 10px; transition: opacity 0.3s; }
        button:hover { opacity: 0.9; }
        .btn-start { background: #3498db; }
        .question-box { margin: 25px 0; background: #f9f9f9; padding: 20px; border-radius: 8px; border-left: 5px solid #3498db; }
        .options { display: flex; gap: 15px; }
        .btn-opt { flex: 1; padding: 15px; font-weight: bold; font-size: 18px; }
        .btn-correct { background: #27ae60; }
        .btn-wrong { background: #e74c3c; }
        .report-item { padding: 10px; border-bottom: 1px solid #eee; font-size: 14px; line-height: 1.4; }
        .mark-badge { font-weight: bold; padding: 3px 8px; border-radius: 4px; display: inline-block; margin-right: 10px; }
        .correct-bg { background: #d4edda; color: #155724; }
        .wrong-bg { background: #f8d7da; color: #721c24; }
        #progress { font-weight: bold; color: #7f8c8d; }
    </style>
</head>
<body>

<div class="container">
    <h2>Support Agents interview</h2>

    <div id="setup" class="setup-section active">
        <p>Enter the candidate's name to generate 15 random questions.</p>
        <input type="text" id="candidateName" placeholder="Candidate name : ">
        <button class="btn-start" onclick="startInterview()">Start Interview</button>
    </div>

    <div id="quiz" class="quiz-section">
        <div id="progress">Question 1 of 15</div>
        <div class="question-box">
            <h3 id="questionText">Loading...</h3>
            <div class="options">
                <button class="btn-opt btn-correct" onclick="submitAnswer(1)">CORRECT</button>
                <button class="btn-opt btn-wrong" onclick="submitAnswer(0)">WRONG</button>
            </div>
        </div>
    </div>

    <div id="result" class="result-section">
        <h3>Interview Performance Report</h3>
        <p><strong>Candidate name:</strong> <span id="resName"></span></p>
        <p><strong>Total Score:</strong> <span id="resScore" style="font-size: 1.2em; color: #2980b9;"></span> / 15</p>
        <hr>
        <div id="marksDistribution"></div>
        
        <button id="tgBtn" onclick="sendToTelegram()" style="background: #0088cc;">Send to Telegram DM</button>
        <button onclick="restartSystem()" style="background: #27ae60;">New Interview</button>
    </div>
</div>

<script>
    // --- TELEGRAM CONFIGURATION ---
    const TG_TOKEN = "8795354838:AAG5mGQbXEMZLRYlmbZybO68FV8l6A1q-HQ";
    const TG_CHAT_ID = "5599632633";

    const questionBank = [
        { q: "What is DM? (Murder without a reason)" },
        { q: "What is Spawn Kill? (Murder at spawn)" },
        { q: "What is FF? (Friendly Fire)" },
        { q: "What is DB? (Murder by machine)" },
        { q: "What is TK? (murder of members of your team, organization, family, or any other allies)" },
        { q: "What is the command to use the first aid kit? (/healme)" },
        { q: "How do I open the family warehouse? (/famsklad)" },
        { q: "How do I show my military ID? (/showvb)" },
        { q: "How do I view the list of lawyers online? (/adlist)" },
        { q: "How do I open the garage menu? (/garage)" },
        { q: "How do I view the list of active job interviews? (/vacancecy)" },
        { q: "How do I open the business menu? (/business)" },
        { q: "How to open the greenhouse menu? (/green)" },
        { q: "How to sell a car? (/sellmycar)" },
        { q: "How to show the vehicle passport? (/pts)" },
        { q: "From what level can you work as a pilot? (From level 15)" },
        { q: "What should I do if I don't receive a donation? (/donate - check)" },
        { q: "What materials are needed to build a greenhouse? (Wood, glass, and rebar)" },
        { q: "What determines the salary level for an armorer? (The level of the employee)" },
        { q: "When does the family container capture begin? (Every hour at random times)" },
        { q: "What do the Support Agents do? (Answering the Questions)" },
        { q: "What is Minimum Requirement per day for Support Agents? (2hrs - Activity, 10 /ans)" },
        { q: "What is minimum term for a support Agents? (7 Days)" },
        { q: "Can Support Agents Use /ans for personal purposes? (No)" },
        { q: "Can Support Agents Ask players to post questions in /ask in any chat? (No)" },
        { q: "Can Support Agents Participate in Role Play Process? (Yes)" },
        { q: "Can Support Agents hold Leadership Postions? (No)" }
    ];

    let selectedQuestions = [];
    let currentIdx = 0;
    let score = 0;
    let userReport = [];
    let candidateName = "";

    function startInterview() {
        candidateName = document.getElementById('candidateName').value.trim();
        if (!candidateName) return alert("Please enter the candidate name!");
        
        currentIdx = 0;
        score = 0;
        userReport = [];
        selectedQuestions = [...questionBank].sort(() => 0.5 - Math.random()).slice(0, 15);
        
        document.getElementById('setup').classList.remove('active');
        document.getElementById('quiz').classList.add('active');
        showQuestion();
    }

    function showQuestion() {
        document.getElementById('progress').innerText = `Question ${currentIdx + 1} of 15`;
        document.getElementById('questionText').innerText = selectedQuestions[currentIdx].q;
    }

    function submitAnswer(points) {
        score += points;
        userReport.push({ question: selectedQuestions[currentIdx].q, mark: points });

        currentIdx++;
        if (currentIdx < 15) showQuestion(); else showResults();
    }

    function showResults() {
        document.getElementById('quiz').classList.remove('active');
        document.getElementById('result').classList.add('active');
        document.getElementById('resName').innerText = candidateName;
        document.getElementById('resScore').innerText = score;

        let distributionHTML = "";
        userReport.forEach((item, index) => {
            const badgeClass = item.mark === 1 ? 'correct-bg' : 'wrong-bg';
            distributionHTML += `
                <div class="report-item">
                    <span class="mark-badge ${badgeClass}">${item.mark} Mark</span>
                    <strong>Q${index + 1}:</strong> ${item.question}
                </div>`;
        });
        document.getElementById('marksDistribution').innerHTML = distributionHTML;
    }

    function sendToTelegram() {
        let text = `📋 SUPPORT AGENT REPORT\n\n`;
        text += `👤 Candidate: ${candidateName}\n`;
        text += `🎯 Total Score: ${score}/15\n\n`;
        text += `DETAILS:\n`;
        userReport.forEach((item, index) => {
            let icon = item.mark === 1 ? "✅" : "❌";
            text += `${index + 1}. ${icon} ${item.question}\n`;
        });

        // Use direct URL method to ensure it works on all devices
        const url = `https://api.telegram.org/bot${TG_TOKEN}/sendMessage?chat_id=${TG_CHAT_ID}&text=${encodeURIComponent(text)}`;
        
        const win = window.open(url, "_blank", "width=200,height=200");
        
        // Auto-close the tab if possible after a short delay
        setTimeout(() => { if(win) win.close(); }, 1500);
        
        alert("Report triggered! Please check your Telegram DM.");
    }

    function restartSystem() {
        document.getElementById('candidateName').value = "";
        document.getElementById('result').classList.remove('active');
        document.getElementById('setup').classList.add('active');
        document.getElementById('tgBtn').innerText = "Send to Telegram DM";
    }
</script>

</body>
</html>
